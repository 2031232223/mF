name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with: { flutter-version: '3.19.0', channel: 'stable', cache: true }
      
      - name: Install deps (ignore warnings)
        run: flutter pub get || true
      
      - name: Build APK (no tree-shake, ignore warnings)
        run: |
          flutter build apk --release --split-per-abi \
            --no-tree-shake-icons \
            --dart-define=DART_OBFUSCATION=false \
            --suppress-analytics || true
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-apk
          path: build/app/outputs/flutter-apk/app-*.apk
          retention-days: 7
