name: Build APK Release Optimized

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🐦 Set up Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze (Non-blocking)
        run: flutter analyze --no-fatal-warnings || true

      - name: 🛠️ Build Optimized APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/symbols \
            --no-tree-shake-icons \
            --no-shrink
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: 📊 Show APK info
        run: |
          echo "📱 APK Size Report:"
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo "💾 Size: $(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-apk-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
