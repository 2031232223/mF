name: Build APK Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        working-directory: nova_aden_app
        run: flutter pub get
      
      - name: Build APK Release
        working-directory: nova_aden_app
        run: |
          echo "🔨 Building APK..."
          flutter build apk --release --no-tree-shake-icons
          echo "✅ Build completed"
          echo "📁 Listing outputs..."
          find build/ -name "*.apk" -type f || echo "⚠️ No APK found yet"
      
      - name: Locate APK
        id: locate_apk
        working-directory: nova_aden_app
        run: |
          echo "🔍 Searching for APK..."
          APK_PATH=$(find . -name "app-release.apk" 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK not found!"
            exit 1
          fi
          echo "✅ APK found at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          ls -lh "$APK_PATH"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-apk
          path: nova_aden_app/${{ steps.locate_apk.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: nova_aden_app/${{ steps.locate_apk.outputs.apk_path }}
          body: |
            ## 🎉 Nova ADEN - ${{ github.ref_name }}
            
            ✅ **Aplicación Funcional con:**
            - Bottom Navigation (POS, Productos, Reportes, Config)
            - Splash Screen Profesional
            - Inventario Completo
            - Punto de Venta
            - Compras
            - Stock Bajo
            
            📱 **Android 8.0+ | ~70 MB**
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
