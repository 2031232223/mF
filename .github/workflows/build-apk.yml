name: Build APK Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK Release (Optimized)
        run: |
          echo "🔨 Building optimized APK..."
          flutter build apk --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols
          echo "✅ Build completed"
          echo "📊 APK Size:"
          ls -lh build/app/outputs/flutter-apk/app-release.apk
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-aden-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## 🎉 Nova ADEN - ${{ github.ref_name }}
            
            ### ✅ Características:
            - Bottom Navigation (POS, Productos, Compras, Reportes)
            - Inventario Completo (RF 1-5)
            - Punto de Venta (RF 12-22)
            - Módulo de Compras (RF 6-11)
            - Stock Bajo (RF 5)
            
            ### ⚙️ Especificaciones:
            - Android 8.0+ (minSdk 26)
            - Flutter 3.22.0
            - SQLite Offline
            - **~45-50 MB** (Optimized with obfuscate)
            - Universal APK (todas las arquitecturas)
            
            ### 👨‍💻 Freddy - Tesis Nova ADEN
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
