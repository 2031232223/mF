name: Build Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons --target-platform android-arm64

      - name: List APK files
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Check APK size
        run: |
          echo "=== Tamaño del APK ==="
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            SIZE=$(stat -c%s build/app/outputs/flutter-apk/app-release.apk)
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "Tamaño: ${SIZE_MB} MB (${SIZE} bytes)"
            if [ $SIZE_MB -lt 20 ]; then
              echo "⚠️ WARNING: APK pequeña (< 20 MB)"
            else
              echo "✅ OK: Tamaño correcto"
            fi
          else
            echo "❌ ERROR: APK no encontrada"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-ADEN-Release-APK-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
